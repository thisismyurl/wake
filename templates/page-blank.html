<!-- Blank-canvas template: a deliberate structural variation. The site header
     and footer template parts are omitted so authors can build full-bleed
     landing pages with no chrome. The skip-link target (<main id="main-content">)
     and the required h1 are still present, so keyboard navigation and the WCAG
     2.1 1.3.1 heading contract hold. Page content (including any custom header
     or footer) is authored inside post-content. -->
<!-- wp:group {"tagName":"main","id":"main-content","layout":{"type":"default"}} -->
<main class="wp-block-group" id="main-content">

	<!-- Page heading (required per WCAG 2.1 1.3.1). Empty by design; add a title
	     in the Site Editor. Do not delete this block. -->
	<!-- wp:heading {"level":1} -->
	<h1></h1>
	<!-- /wp:heading -->
	<!-- wp:post-content {"layout":{"type":"default"}} /-->
</main>
<!-- /wp:group -->
